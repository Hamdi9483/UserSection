<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تسجيل المرضى | نظام العيادة</title>
  
  <!-- مكتبة QR Code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.25s ease, border-color 0.2s ease, color 0.2s, box-shadow 0.2s;
    }

    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-gradient);
      padding: 1.5rem;
    }

    :root {
      --bg-gradient: linear-gradient(135deg, #f5f7fc 0%, #e9eef5 100%);
      --card-bg: rgba(255, 255, 255, 0.96);
      --card-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 2px 8px rgba(0, 0, 0, 0.02);
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --border-light: #e2e8f0;
      --input-bg: #ffffff;
      --input-border: #cbd5e1;
      --input-focus: #3b82f6;
      --btn-primary: #2563eb;
      --btn-primary-hover: #1d4ed8;
      --btn-text: white;
      --icon-color: #5b6e8c;
      --toggle-bg: #f1f5f9;
      --toggle-border: #cbd5e1;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    [data-theme="dark"] {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #111827 100%);
      --card-bg: rgba(30, 35, 48, 0.96);
      --card-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 2px 10px rgba(0, 0, 0, 0.3);
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e6;
      --text-muted: #94a3b8;
      --border-light: #334155;
      --input-bg: #1e293b;
      --input-border: #475569;
      --input-focus: #60a5fa;
      --btn-primary: #3b82f6;
      --btn-primary-hover: #2563eb;
      --btn-text: #ffffff;
      --icon-color: #94a3b8;
      --toggle-bg: #1e293b;
      --toggle-border: #475569;
      --success: #4ade80;
      --error: #f87171;
      --warning: #fbbf24;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card-bg);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      padding: 2rem 2rem 2.2rem;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: translateY(-3px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.75rem;
    }
    .toggle-group {
      display: flex;
      gap: 0.75rem;
    }
    .toggle-btn {
  background: var(--btn-primary);     /* أزرق في النهاري (#2563eb) */
  border: none;
  border-radius: 3rem;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.3rem;
  color: white;                      /* النص والأيقونة بيضاء */
  transition: all 0.2s;
}
    [data-theme="dark"] .toggle-btn {
  background: #000000;
}

    .toggle-btn i {
      color: white;
    }
   .toggle-btn:hover {
  background: var(--btn-primary-hover);
  transform: scale(0.96);
}
   
    .lang-btn {
      width: 44px;   /* نفس عرض الأزرار الأخرى */
      padding: 0;
      gap: 0;
    }
    .lang-btn span {
      display: none;  /* إخفاء النص "EN" */
    }

    h2 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(120deg, var(--text-primary), var(--btn-primary));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      margin: 0;
    }

    .input-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
    }
    .input-icon {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon i {
      position: absolute;
      left: 1rem;
      color: var(--icon-color);
      font-size: 1.1rem;
      pointer-events: none;
    }
    body[dir="rtl"] .input-icon i {
      left: auto;
      right: 1rem;
    }
    .input-icon input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.7rem;
      border-radius: 1.2rem;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      font-size: 1rem;
      color: var(--text-primary);
      outline: none;
      font-weight: 500;
    }
    body[dir="rtl"] .input-icon input {
      padding: 0.9rem 2.7rem 0.9rem 1rem;
    }
    .input-icon input:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    .input-icon input::placeholder {
      color: var(--text-muted);
      font-weight: 400;
    }

    .btn-primary {
      width: 100%;
      background: var(--btn-primary);
      border: none;
      padding: 0.9rem;
      border-radius: 2rem;
      font-size: 1rem;
      font-weight: 700;
      color: var(--btn-text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 0.5rem;
      box-shadow: 0 8px 18px rgba(37,99,235,0.2);
    }
    .btn-primary:hover {
      background: var(--btn-primary-hover);
      transform: scale(0.98);
    }
    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--btn-primary);
      color: var(--btn-primary);
      box-shadow: none;
    }
    .btn-outline:hover {
      background: var(--btn-primary);
      color: white;
    }

    .status {
      padding: 12px;
      border-radius: 1.2rem;
      margin: 18px 0;
      text-align: center;
      font-weight: 500;
      font-size: 0.85rem;
      display: none;
    }
    .status.success {
      display: block;
      background: rgba(34,197,94,0.12);
      color: var(--success);
      border: 1px solid rgba(34,197,94,0.3);
    }
    .status.error {
      display: block;
      background: rgba(239,68,68,0.12);
      color: var(--error);
      border: 1px solid rgba(239,68,68,0.3);
    }
    .status.warn {
      display: block;
      background: rgba(245,158,11,0.12);
      color: var(--warning);
      border: 1px solid rgba(245,158,11,0.3);
    }

    .qr-container {
      display: none;
      text-align: center;
      margin-top: 24px;
      padding: 20px;
      background: var(--input-bg);
      border-radius: 1.5rem;
      border: 1px solid var(--border-light);
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .qr-container h3 {
      font-size: 1.2rem;
      margin-bottom: 12px;
      color: var(--text-primary);
    }
    .qr-container img {
      max-width: 180px;
      background: white;
      padding: 8px;
      border-radius: 1rem;
      margin: 8px 0;
    }
    .data-preview {
      background: var(--card-bg);
      padding: 12px;
      border-radius: 1rem;
      margin: 12px 0;
      font-size: 0.85rem;
      text-align: right;
      border: 1px solid var(--border-light);
    }
    .data-preview div {
      margin: 6px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--card-bg);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 40px;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border-light);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      transition: transform 0.25s;
      white-space: nowrap;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
    @media (max-width: 520px) {
      .card { padding: 1.6rem; }
      h2 { font-size: 1.6rem; }
      .toggle-btn { width: 38px; height: 38px; }
      .btn-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h2 id="pageTitle">تسجيل المرضى</h2>
    <div class="toggle-group">
      <button class="toggle-btn" id="themeBtn" title="الوضع الليلي">
        <i class="fas fa-moon" id="themeIcon"></i>
      </button>
      <button class="toggle-btn lang-btn" id="langBtn" title="تبديل اللغة">
        <i class="fas fa-globe"></i> <span id="langBtnText"></span>
      </button>
    </div>
  </div>

  <form id="patientForm">
    <div class="input-group">
      <label id="nameLabel">الاسم الكامل</label>
      <div class="input-icon">
        <i class="fas fa-user"></i>
        <input type="text" id="fullName" placeholder="أدخل الاسم" required>
      </div>
    </div>
    <div class="input-group">
      <label id="phoneLabel">رقم الهاتف</label>
      <div class="input-icon">
        <i class="fas fa-phone"></i>
        <input type="tel" id="phone" placeholder="أدخل رقم الهاتف" required>
      </div>
    </div>
    <button type="submit" class="btn-primary" id="submitBtn">
      <i class="fas fa-qrcode"></i> <span id="btnText">توليد رمز QR</span>
    </button>
  </form>

  <div id="statusMsg" class="status"></div>

  <div id="qrSection" class="qr-container">
    <h3><i class="fas fa-check-circle"></i> <span id="qrTitle">تم إنشاء الرمز</span></h3>
    <img id="qrImage" src="" alt="QR Code">
    <div class="data-preview">
      <div><strong>👤</strong> <span id="previewName"></span></div>
      <div><strong>📱</strong> <span id="previewPhone"></span></div>
    </div>
    <div class="btn-group">
      <button class="btn-primary" id="saveQrBtn"><i class="fas fa-download"></i> <span id="saveText">حفظ الصورة</span></button>
      <button class="btn-primary btn-outline" id="newPatientBtn"><i class="fas fa-plus-circle"></i> <span id="newText">تسجيل جديد</span></button>
    </div>
  </div>
</div>

<div class="toast" id="toastMsg"><i class="fas fa-info-circle"></i> <span id="toastText"></span></div>

<script>
  // ============================================
  // 1. إعدادات Supabase
  // ============================================
  const SUPABASE_URL = 'https://ncqvzpcqotdiwjqbwlwp.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_98lfpU1zaqG-MNxkhlvg6g_KEMPMPbS';
  let supabaseClient = null;

  // ============================================
  // 2. الترجمة والواجهة
  // ============================================
  let currentLang = localStorage.getItem('patient_lang') || 'ar';
  let currentTheme = localStorage.getItem('patient_theme') || 'light';

  const dict = {
    ar: {
      title: "تسجيل المرضى",
      nameLabel: "الاسم الكامل", namePlace: "أدخل الاسم",
      phoneLabel: "رقم الهاتف", phonePlace: "أدخل رقم الهاتف",
      btnGen: "توليد رمز QR",
      qrTitle: "تم إنشاء الرمز",
      saveText: "حفظ الصورة", newText: "تسجيل جديد",
      successSave: "✅ تم حفظ المريض بنجاح!",
      errorSave: "❌ فشل الحفظ، حاول مرة أخرى",
      fillFields: "⚠️ يرجى ملء جميع الحقول",
      cooldownMsg: "⏱️ انتظر {time} قبل إضافة مريض آخر",
      savedImage: "✅ تم حفظ الصورة",
      langName: "English", themeName: "الوضع الليلي",
      loading: "جاري الحفظ...",
      errNetwork: "❌ مشكلة في الاتصال بقاعدة البيانات",
      tableError: "⚠️ خطأ في قاعدة البيانات: تأكد من تعديل الجدول (إزالة NOT NULL من appointment_date و appointment_time)"
    },
    en: {
      title: "Patient Registration",
      nameLabel: "Full Name", namePlace: "Enter name",
      phoneLabel: "Phone Number", phonePlace: "Enter phone",
      btnGen: "Generate QR Code",
      qrTitle: "QR Code Ready",
      saveText: "Save Image", newText: "New Patient",
      successSave: "✅ Patient saved successfully!",
      errorSave: "❌ Failed to save, try again",
      fillFields: "⚠️ Please fill all fields",
      cooldownMsg: "⏱️ Wait {time} before adding another patient",
      savedImage: "✅ Image saved",
      langName: "العربية", themeName: "Dark Mode",
      loading: "Saving...",
      errNetwork: "❌ Database connection error",
      tableError: "⚠️ Database error: Please alter table appointments (remove NOT NULL from appointment_date and appointment_time)"
    }
  };

  function applyLanguage(lang) {
    const t = dict[lang];
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.body.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
    document.getElementById('pageTitle').innerText = t.title;
    document.getElementById('nameLabel').innerText = t.nameLabel;
    document.getElementById('fullName').placeholder = t.namePlace;
    document.getElementById('phoneLabel').innerText = t.phoneLabel;
    document.getElementById('phone').placeholder = t.phonePlace;
    document.getElementById('btnText').innerText = t.btnGen;
    document.getElementById('qrTitle').innerText = t.qrTitle;
    document.getElementById('saveText').innerText = t.saveText;
    document.getElementById('newText').innerText = t.newText;
    // إخفاء أي نص داخل زر اللغة (يبقى الأيقونة فقط)
    document.getElementById('langBtnText').innerText = '';
    document.getElementById('langBtn').title = t.langName;
    document.getElementById('themeBtn').title = t.themeName;
    localStorage.setItem('patient_lang', lang);
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const themeIcon = document.getElementById('themeIcon');
    if (theme === 'dark') {
      themeIcon.className = 'fas fa-sun';
    } else {
      themeIcon.className = 'fas fa-moon';
    }
    document.getElementById('themeBtn').title = dict[currentLang].themeName;
    localStorage.setItem('patient_theme', theme);
  }

  function toggleLang() {
    currentLang = currentLang === 'ar' ? 'en' : 'ar';
    applyLanguage(currentLang);
  }
  function toggleTheme() {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    applyTheme(currentTheme);
  }

  // ============================================
  // 3. أدوات مساعدة
  // ============================================
  const COOLDOWN_MIN = 1;
  let cooldownInterval = null;

  function showToast(msg, type = 'info') {
    const toastEl = document.getElementById('toastMsg');
    const textSpan = document.getElementById('toastText');
    textSpan.innerText = msg;
    toastEl.className = `toast show`;
    setTimeout(() => toastEl.classList.remove('show'), 2800);
  }

  function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.className = `status ${type}`;
    el.innerText = msg;
    el.style.display = 'block';
    setTimeout(() => {
      if (el.style.display !== 'none') el.style.display = 'none';
    }, 4000);
  }

  function getCooldownRemaining() {
    const last = parseInt(localStorage.getItem('patient_last_submit') || '0');
    if (!last) return 0;
    const elapsed = Date.now() - last;
    const limit = COOLDOWN_MIN * 60 * 1000;
    return Math.max(0, limit - elapsed);
  }

  function updateCooldownUI() {
    const remaining = getCooldownRemaining();
    const btn = document.getElementById('submitBtn');
    const btnSpan = document.getElementById('btnText');
    const t = dict[currentLang];
    if (remaining > 0) {
      const seconds = Math.ceil(remaining / 1000);
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      const timeStr = mins > 0 ? `${mins}:${secs.toString().padStart(2,'0')}` : `0:${secs.toString().padStart(2,'0')}`;
      btn.disabled = true;
      btnSpan.innerText = t.cooldownMsg.replace('{time}', timeStr);
      return true;
    } else {
      btn.disabled = false;
      btnSpan.innerText = t.btnGen;
      if (cooldownInterval) { clearInterval(cooldownInterval); cooldownInterval = null; }
      return false;
    }
  }

  function startCooldown() {
    localStorage.setItem('patient_last_submit', Date.now().toString());
    updateCooldownUI();
    if (cooldownInterval) clearInterval(cooldownInterval);
    cooldownInterval = setInterval(() => {
      const active = updateCooldownUI();
      if (!active && cooldownInterval) {
        clearInterval(cooldownInterval);
        cooldownInterval = null;
      }
    }, 1000);
  }

  // ============================================
  // 4. دالة الحفظ في Supabase (بدون تاريخ أو وقت)
  // ============================================
  async function savePatientToDB(name, phone) {
    if (!supabaseClient) throw new Error('Supabase not initialized');
    
    const { data, error } = await supabaseClient
      .from('appointments')
      .insert([{
        patient_name: name,
        phone: phone,
        status: 'pending'
      }])
      .select();
    
    if (error) throw error;
    return data[0];
  }

  // ============================================
  // 5. معالجة النموذج وتوليد QR
  // ============================================
  async function handleSubmit(e) {
    e.preventDefault();
    if (getCooldownRemaining() > 0) {
      const t = dict[currentLang];
      const remaining = getCooldownRemaining();
      const seconds = Math.ceil(remaining / 1000);
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      const timeStr = mins > 0 ? `${mins}:${secs.toString().padStart(2,'0')}` : `0:${secs.toString().padStart(2,'0')}`;
      showStatus(t.cooldownMsg.replace('{time}', timeStr), 'warn');
      showToast(t.cooldownMsg.replace('{time}', timeStr), 'warn');
      return;
    }

    const name = document.getElementById('fullName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const t = dict[currentLang];

    if (!name || !phone) {
      showStatus(t.fillFields, 'error');
      showToast(t.fillFields, 'error');
      return;
    }

    const submitBtn = document.getElementById('submitBtn');
    const btnSpan = document.getElementById('btnText');
    submitBtn.disabled = true;
    btnSpan.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${t.loading}`;

    try {
      const saved = await savePatientToDB(name, phone);
      const qrContent = `PATIENT|ID:${saved.id}|${name}|${phone}`;
      const qrDataUrl = await QRCode.toDataURL(qrContent, {
        errorCorrectionLevel: 'M',
        width: 200,
        margin: 2
      });

      document.getElementById('qrImage').src = qrDataUrl;
      document.getElementById('previewName').innerText = name;
      document.getElementById('previewPhone').innerText = phone;
      document.getElementById('qrSection').style.display = 'block';

      showStatus(t.successSave, 'success');
      showToast(t.successSave, 'success');

      startCooldown();
      btnSpan.innerText = t.btnGen;
      submitBtn.disabled = false;
    } catch (err) {
      console.error(err);
      let errorMsg = t.errorSave;
      if (err.message && (err.message.includes('appointment_date') || err.message.includes('appointment_time'))) {
        errorMsg = t.tableError;
      } else {
        errorMsg += ' : ' + (err.message || '');
      }
      showStatus(errorMsg, 'error');
      showToast(errorMsg, 'error');
      submitBtn.disabled = false;
      btnSpan.innerText = t.btnGen;
    }
  }

  // ============================================
  // 6. حفظ الصورة
  // ============================================
  document.getElementById('saveQrBtn').addEventListener('click', () => {
    const img = document.getElementById('qrImage');
    if (!img.src) return;
    const link = document.createElement('a');
    link.download = `patient_qr_${Date.now()}.png`;
    link.href = img.src;
    link.click();
    showToast(dict[currentLang].savedImage, 'success');
  });

  // ============================================
  // 7. زر تسجيل جديد
  // ============================================
  document.getElementById('newPatientBtn').addEventListener('click', () => {
    document.getElementById('qrSection').style.display = 'none';
    document.getElementById('patientForm').reset();
    updateCooldownUI();
    document.getElementById('statusMsg').style.display = 'none';
  });

  // ============================================
  // 8. التهيئة
  // ============================================
  window.addEventListener('DOMContentLoaded', () => {
    if (typeof supabase !== 'undefined') {
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      console.log('✅ Supabase ready');
    } else {
      console.warn('⚠️ Supabase library missing');
      showToast('⚠️ لم يتم تحميل مكتبة Supabase', 'error');
    }

    applyTheme(currentTheme);
    applyLanguage(currentLang);

    document.getElementById('themeBtn').addEventListener('click', toggleTheme);
    document.getElementById('langBtn').addEventListener('click', toggleLang);
    document.getElementById('patientForm').addEventListener('submit', handleSubmit);

    updateCooldownUI();
  });
</script>
</body>
</html>
